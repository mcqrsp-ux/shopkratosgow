<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>𝕾𝖍𝖔𝖕 𝕶𝖗𝖆𝖙𝖔𝖘𝕲𝖔𝖜</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      background:#050505;
      color:#fff;
      padding:25px;
      font-family:'Orbitron',sans-serif;
      overflow-x:hidden;
      position:relative;
    }

    .blood-particles{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }

    .blood-particles span{
      position:absolute;
      top:-120px;
      width:10px;
      height:10px;
      background:radial-gradient(circle, #ff3b3b 0%, #c40000 55%, #4d0000 100%);
      border-radius:50%;
      box-shadow:
        0 0 8px rgba(255,0,0,.7),
        0 0 18px rgba(180,0,0,.45);
      opacity:.9;
      animation:fall linear infinite;
    }

    .blood-particles span::after{
      content:"";
      position:absolute;
      left:50%;
      top:70%;
      transform:translateX(-50%);
      width:3px;
      height:22px;
      background:linear-gradient(to bottom, rgba(180,0,0,.9), rgba(80,0,0,0));
      border-radius:999px;
      opacity:.85;
    }

    .drop-lines{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }

    .drop-lines span{
      position:absolute;
      top:-180px;
      width:4px;
      height:140px;
      border-radius:999px;
      background:linear-gradient(to bottom, rgba(255,0,0,.9), rgba(120,0,0,.35), transparent);
      box-shadow:0 0 10px rgba(255,0,0,.35);
      opacity:.45;
      animation:drip linear infinite;
    }

    @keyframes fall{
      0%{
        transform:translateY(-120px) scale(.7);
        opacity:0;
      }
      10%{
        opacity:.95;
      }
      100%{
        transform:translateY(120vh) scale(1.15);
        opacity:0;
      }
    }

    @keyframes drip{
      0%{
        transform:translateY(-180px);
        opacity:0;
      }
      15%{
        opacity:.45;
      }
      100%{
        transform:translateY(120vh);
        opacity:0;
      }
    }

    .container{
      max-width:1100px;
      margin:auto;
      position:relative;
      z-index:2;
    }

    .title{
      font-size:3.5rem;
      text-align:center;
      margin-bottom:10px;
      color:#fff;
      text-shadow:
        0 0 10px #ff0000,
        0 0 25px #ff0000,
        0 0 50px #ff0000;
    }

    .subtitle{
      text-align:center;
      color:#ccc;
      margin-bottom:25px;
    }

    .top-buttons{
      text-align:center;
      margin-bottom:30px;
    }

    .top-buttons a{
      text-decoration:none;
      padding:14px 25px;
      border-radius:10px;
      border:2px solid #ff0000;
      color:#fff;
      font-weight:bold;
      transition:.3s;
      box-shadow:0 0 10px #ff0000;
      position:relative;
      z-index:2;
    }

    .top-buttons a:hover{
      background:#ff0000;
      box-shadow:0 0 20px #ff0000,0 0 40px #ff0000;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }

    .card{
      background:#0a0a0a;
      border:1px solid #ff0000;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(255,0,0,0.2);
      transition:.3s;
      position:relative;
      z-index:2;
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow:0 0 25px #ff0000;
    }

    .card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  filter:brightness(.7);
    }

    .card-content{
      padding:15px;
      text-align:center;
    }

    .card-title{
      margin-bottom:10px;
      font-size:1.2rem;
      color:#fff;
      text-shadow:0 0 10px #ff0000;
    }

    .status{
      color:#00ff88;
      margin:10px 0;
      font-weight:bold;
    }

    .buy-btn{
      display:block;
      margin-top:10px;
      padding:12px;
      text-decoration:none;
      color:#fff;
      border:2px solid #ff0000;
      border-radius:10px;
      transition:.3s;
      box-shadow:0 0 10px #ff0000;
    }

    .buy-btn:hover{
      background:#ff0000;
      box-shadow:
        0 0 20px #ff0000,
        0 0 40px #ff0000,
        0 0 60px #ff0000;
      transform:scale(1.05);
    }

  </style>
</head>

</body>
