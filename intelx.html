<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>𝕾𝖍𝖔𝖕 𝕶𝖗𝖆𝖙𝖔𝖘𝕲𝖔𝖜</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      background:#050505;
      color:#fff;
      padding:25px;
      font-family:'Orbitron',sans-serif;
      overflow-x:hidden;
      position:relative;
    }

    .kratos-bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
      overflow:hidden;
    }

    .kratos-bg img{
      position:absolute;
      right:-40px;
      bottom:-20px;
      width:min(48vw, 720px);
      max-width:none;
      opacity:.16;
      filter:
        invert(1)
        grayscale(1)
        brightness(.55)
        contrast(1.6)
        drop-shadow(0 0 25px rgba(255,0,0,.22))
        drop-shadow(0 0 60px rgba(255,0,0,.12));
      mix-blend-mode:screen;
      transform-origin:center bottom;
      animation:kratosFloat 7s ease-in-out infinite,
                 kratosPulse 4.5s ease-in-out infinite;
    }

    .kratos-bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 75% 70%, rgba(255,0,0,.10), transparent 26%),
        radial-gradient(circle at 70% 80%, rgba(255,255,255,.03), transparent 24%);
      animation:kratosAura 6s ease-in-out infinite;
    }

    @keyframes kratosFloat{
      0%,100%{
        transform:translateY(0) translateX(0) scale(1);
      }
      50%{
        transform:translateY(-10px) translateX(-6px) scale(1.02);
      }
    }

    @keyframes kratosPulse{
      0%,100%{
        opacity:.13;
      }
      50%{
        opacity:.22;
      }
    }

    @keyframes kratosAura{
      0%,100%{
        opacity:.35;
        transform:scale(1);
      }
      50%{
        opacity:.65;
        transform:scale(1.04);
      }
    }

    .blood-particles{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }

    .blood-particles span{
      position:absolute;
      top:-120px;
      width:10px;
      height:10px;
      background:radial-gradient(circle, #ff3b3b 0%, #c40000 55%, #4d0000 100%);
      border-radius:50%;
      box-shadow:
        0 0 8px rgba(255,0,0,.7),
        0 0 18px rgba(180,0,0,.45);
      opacity:.9;
      animation:fall linear infinite;
    }

    .blood-particles span::after{
      content:"";
      position:absolute;
      left:50%;
      top:70%;
      transform:translateX(-50%);
      width:3px;
      height:22px;
      background:linear-gradient(to bottom, rgba(180,0,0,.9), rgba(80,0,0,0));
      border-radius:999px;
      opacity:.85;
    }

    .drop-lines{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }

    .drop-lines span{
      position:absolute;
      top:-180px;
      width:4px;
      height:140px;
      border-radius:999px;
      background:linear-gradient(to bottom, rgba(255,0,0,.9), rgba(120,0,0,.35), transparent);
      box-shadow:0 0 10px rgba(255,0,0,.35);
      opacity:.45;
      animation:drip linear infinite;
    }

    @keyframes fall{
      0%{
        transform:translateY(-120px) scale(.7);
        opacity:0;
      }
      10%{
        opacity:.95;
      }
      100%{
        transform:translateY(120vh) scale(1.15);
        opacity:0;
      }
    }

    @keyframes drip{
      0%{
        transform:translateY(-180px);
        opacity:0;
      }
      15%{
        opacity:.45;
      }
      100%{
        transform:translateY(120vh);
        opacity:0;
      }
    }

    .container{
      max-width:1100px;
      margin:auto;
      position:relative;
      z-index:2;
    }

    .title{
      font-size:3.5rem;
      text-align:center;
      margin-bottom:10px;
      color:#fff;
      text-shadow:
        0 0 10px #ff0000,
        0 0 25px #ff0000,
        0 0 50px #ff0000;
    }

    .subtitle{
      text-align:center;
      color:#ccc;
      margin-bottom:25px;
    }

    .top-buttons{
      text-align:center;
      margin-bottom:30px;
    }

    .top-buttons a{
      text-decoration:none;
      padding:14px 25px;
      border-radius:10px;
      border:2px solid #ff0000;
      color:#fff;
      font-weight:bold;
      transition:.3s;
      box-shadow:0 0 10px #ff0000;
      position:relative;
      z-index:2;
    }

    .top-buttons a:hover{
      background:#ff0000;
      box-shadow:0 0 20px #ff0000,0 0 40px #ff0000;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }

    .card{
      background:#0a0a0a;
      border:1px solid #ff0000;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(255,0,0,0.2);
      transition:.3s;
      position:relative;
      z-index:2;
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow:0 0 25px #ff0000;
    }

    .card img{
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      filter:brightness(.7);
    }

    .card-content{
      padding:15px;
      text-align:center;
    }

    .card-title{
      margin-bottom:10px;
      font-size:1.2rem;
      color:#fff;
      text-shadow:0 0 10px #ff0000;
    }

    .status{
      color:#00ff88;
      margin:10px 0;
      font-weight:bold;
    }

    .buy-btn{
      display:block;
      margin-top:10px;
      padding:12px;
      text-decoration:none;
      color:#fff;
      border:2px solid #ff0000;
      border-radius:10px;
      transition:.3s;
      box-shadow:0 0 10px #ff0000;
    }

    .buy-btn:hover{
      background:#ff0000;
      box-shadow:
        0 0 20px #ff0000,
        0 0 40px #ff0000,
        0 0 60px #ff0000;
      transform:scale(1.05);
    }

    .kratos-left{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
}

.kratos-left img{
  position:absolute;
  left:-40px;
  bottom:-20px;
  width:min(48vw, 720px);
  opacity:.18;
  filter:
    brightness(.6)
    contrast(1.5)
    drop-shadow(0 0 20px rgba(255,0,0,.4))
    drop-shadow(0 0 60px rgba(255,0,0,.2));
  mix-blend-mode:screen;
  animation:kratosLeftFloat 8s ease-in-out infinite,
             kratosGlow 3s ease-in-out infinite;
}

/* ANIMACIONES */
@keyframes kratosLeftFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

@keyframes kratosGlow{
  0%,100%{
    filter:
      brightness(.6)
      contrast(1.5)
      drop-shadow(0 0 10px rgba(255,0,0,.3))
      drop-shadow(0 0 40px rgba(255,0,0,.1));
  }
  50%{
    filter:
      brightness(.8)
      contrast(1.8)
      drop-shadow(0 0 25px rgba(255,0,0,.7))
      drop-shadow(0 0 80px rgba(255,0,0,.4));
  }
}

/* EFECTO OJOS + ESPADAS */
.kratos-left img::after{
  content:"";
}

/* OVERLAY PARA BRILLO ROJO */
.kratos-left::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 35% 30%, rgba(255,0,0,.35), transparent 8%), /* ojos */
    radial-gradient(circle at 30% 55%, rgba(255,0,0,.25), transparent 15%), /* espada */
    radial-gradient(circle at 40% 60%, rgba(255,0,0,.25), transparent 20%);
  mix-blend-mode:screen;
  animation:eyesPulse 2s infinite;
}

@keyframes eyesPulse{
  0%,100%{opacity:.4;}
  50%{opacity:1;}
}
  </style>
</head>
