<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>𝕾𝖍𝖔𝖕 𝕶𝖗𝖆𝖙𝖔𝖘𝕲𝖔𝖜</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      background:#050505;
      color:#fff;
      padding:25px;
      font-family:'Orbitron',sans-serif;
    }

    .container{
      max-width:1100px;
      margin:auto;
    }

    .title{
      font-size:3.5rem;
      text-align:center;
      margin-bottom:10px;
      color:#fff;
      text-shadow:
        0 0 10px #ff0000,
        0 0 25px #ff0000,
        0 0 50px #ff0000;
    }

    .subtitle{
      text-align:center;
      color:#ccc;
      margin-bottom:25px;
    }

    .top-buttons{
      text-align:center;
      margin-bottom:30px;
    }

    .top-buttons a{
      text-decoration:none;
      padding:14px 25px;
      border-radius:10px;
      border:2px solid #ff0000;
      color:#fff;
      font-weight:bold;
      transition:.3s;
      box-shadow:0 0 10px #ff0000;
    }

    .top-buttons a:hover{
      background:#ff0000;
      box-shadow:0 0 20px #ff0000,0 0 40px #ff0000;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }

    .card{
      background:#0a0a0a;
      border:1px solid #ff0000;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(255,0,0,0.2);
      transition:.3s;
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow:0 0 25px #ff0000;
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
      filter:brightness(.7);
    }

    .card-content{
      padding:15px;
      text-align:center;
    }

    .card-title{
      margin-bottom:10px;
      font-size:1.2rem;
      color:#fff;
      text-shadow:0 0 10px #ff0000;
    }

    .status{
      color:#00ff88;
      margin:10px 0;
      font-weight:bold;
    }

    .buy-btn{
      display:block;
      margin-top:10px;
      padding:12px;
      text-decoration:none;
      color:#fff;
      border:2px solid #ff0000;
      border-radius:10px;
      transition:.3s;
      box-shadow:0 0 10px #ff0000;
    }

    .buy-btn:hover{
      background:#ff0000;
      box-shadow:
        0 0 20px #ff0000,
        0 0 40px #ff0000,
        0 0 60px #ff0000;
      transform:scale(1.05);
    }

  </style>
</head>

<body>
  <div class="container">

    <h1 class="title">𝕾𝖍𝖔𝖕 𝕶𝖗𝖆𝖙𝖔𝖘𝕲𝖔𝖜</h1>
    <p class="subtitle">GRUPO DE BOT DOXEO</p>

    <div class="top-buttons">
      <a href="https://t.me/MostrosDataChat" target="_blank">CHAT GRUPAL</a>
    </div>

    <div class="grid">

      <div class="card">
        <img src="imagen1.jpg">
        <div class="card-content">
          <div class="card-title">𝕬𝖕𝖕𝖘 𝕱𝖆𝖐𝖊</div>
          <div class="status">Disponible</div>
          <a class="buy-btn" href="https://t.me/KratosGowOFC2">COMPRAR AQUI</a>
        </div>
      </div>

      <div class="card">
        <img src="imagen2.jpg">
        <div class="card-content">
          <div class="card-title">𝕭𝖔𝖙 𝕯𝖊 𝕯𝖔𝖝𝖊𝖔</div>
          <div class="status">Disponible</div>
          <a class="buy-btn" href="https://t.me/KratosGowOFC2">COMPRAR AQUI</a>
        </div>
      </div>

      <div class="card">
        <img src="imagen3.jpg">
        <div class="card-content">
          <div class="card-title">𝕭𝖎𝖑𝖑𝖊𝖙𝖊𝖘 𝕲5</div>
          <div class="status">Disponible</div>
          <a class="buy-btn" href="https://t.me/KratosGowOFC2">COMPRAR AQUI</a>
        </div>
      </div>

      <div class="card">
        <img src="imagen4.jpg">
        <div class="card-content">
          <div class="card-title">𝕭𝖑𝖔𝖖𝖚𝖊𝖔 𝕷𝖎𝖓𝖊𝖆 + 𝕴𝖒𝖊𝖎</div>
          <div class="status">Disponible</div>
          <a class="buy-btn" href="https://t.me/KratosGowOFC2">COMPRAR AQUI</a>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
